<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entradas - Eventos</title>
    <style>
        :root {
            /* --primary-color: #2563eb;
            --secondary-color: #7c3aed; */
            --primary-color: #2B2D75;
            --secondary-color: #EE753C;

            --background: #f8fafc;
            --text-color: #1e293b;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
            background-color: var(--background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            /* background: white; */
            border-radius: 20px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .image-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            max-height: 600px;
        }

        .image-container img {
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            /* width: 100%; */
            height: 100%;
            object-fit: contain;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .event-button {
            display: inline-block;
            padding: 18px 32px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-width: 200px;
            color: white;
            border: none;
            cursor: pointer;
        }

        .event-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .event-button:hover::before {
            left: 100%;
        }

        .event-button {
            /* background: linear-gradient(135deg, var(--primary-color), #3b82f6); */
            background-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .event-button:hover {
            /* background: linear-gradient(135deg, var(--secondary-color), #8b5cf6); */
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .event-button:active {
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }

            .buttons-container {
                flex-direction: column;
                align-items: center;
            }

            .event-button {
                width: 100%;
                max-width: 280px;
            }
        }

        @media (max-width: 480px) {
            .event-button {
                font-size: 14px;
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>
    <!-- <div class="container"> -->
        <div class="image-container">
            <img src="/img/griss_adf.320x452.jpg" 
                 srcset="/img/griss_adf.320x452.jpg 320w, 
                         /img/griss_adf.640x905.jpg 640w, 
                         /img/griss_adf.1024x1448.jpg 1024w, 
                         /img/griss_adf.1920x2715.jpg 1920w" 
                 sizes="(max-width: 640px) 100vw, (max-width: 1024px) 75vw, 50vw" 
                 alt="griss_adf" 
                 loading="lazy" 
                 decoding="async">
        </div>
        
        <div class="buttons-container">
            <a href="https://www.google.com" target="_blank" class="event-button">
                Entradas 25-abril 19:00
            </a>
            <a href="https://www.microsoft.com" target="_blank" class="event-button">
                Entradas 26-abril 12:00
            </a>
        </div>
    <!-- </div> -->
</body>
</html>
